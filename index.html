<script>
    const API_BASE_URL = 'https://ev-parts-store.onrender.com';
    const tg = window.Telegram?.WebApp;
    if(tg){tg.ready();tg.expand();}

    // 1. Serverdan mahsulotlarni tortib olish
    async function loadProducts() {
        try {
            const response = await fetch(`${API_BASE_URL}/products`);
            const serverData = await response.json();
            // serverData - bu bazadagi mahsulotlar ro'yxati
            renderProducts(serverData); 
        } catch (error) {
            console.error("Ma'lumot yuklashda xatolik:", error);
            // Agar server bo'lmasa, test uchun eski ro'yxatni ishlatamiz
            renderProducts(products); 
        }
    }

    // 2. Mahsulotlarni ekranga chiqarish (Sizning kodingizdagi renderProducts)
    function renderProducts(list) {
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = list.map(p => `
            <div class="product-card" onclick="openDetail(${p.id})">
                </div>
        `).join('');
    }

    // init() funksiyasini yuklashda loadProducts ni chaqiring
    async function init() {
        await loadProducts();

    }
