<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Parts Store</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .product-card { background: #1e1e1e; padding: 15px; margin: 10px 0; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>Elektromobillar uchun ehtiyot qismlar</h1>
    <div id="products">Yuklanmoqda...</div>

    <script>
        // Render'dan olgan havolangizni shu yerga yozing
        const API_BASE_URL = 'https://ev-parts-store.onrender.com';

        async function fetchProducts() {
            try {
                const response = await fetch(`${API_BASE_URL}/products`);
                const data = await response.json();
                
                const container = document.getElementById('products');
                container.innerHTML = '';
                
                data.forEach(item => {
                    container.innerHTML += `
                        <div class="product-card">
                            <h3>${item.name}</h3>
                            <p>Narxi: ${item.price} so'm</p>
                        </div>
                    `;
                });
            } catch (error) {
                document.getElementById('products').innerText = "Ma'lumotlarni yuklashda xatolik yuz berdi.";
            }
        }

        fetchProducts();
    </script>
</body>
</html>
