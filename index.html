<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EV Parts Store</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;
  --bg2:#111118;
  --bg3:#1a1a24;
  --accent:#00e5ff;
  --accent2:#7c3aed;
  --text:#f0f0f0;
  --muted:#888;
  --card:#16161f;
  --border:#2a2a3a;
  --green:#22c55e;
  --red:#ef4444;
}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

.header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 16px}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip: text;
background-clip: text; /* Mana shu qatorni qo'shasiz */}
.cart-btn{position:relative;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text)}
.cart-count{position:absolute;top:-6px;right:-6px;background:var(--accent);color:#000;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:none;align-items:center;justify-content:center}
.cart-count.show{display:flex}
.search-box{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 12px;gap:8px}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:14px;width:100%;font-family:inherit}
.search-box input::placeholder{color:var(--muted)}

.brand-section{padding:16px 16px 0}
.section-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}
.brand-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.brand-tabs::-webkit-scrollbar{display:none}
.brand-tab{flex-shrink:0;padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--card);font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap}
.brand-tab.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}

.cat-section{padding:12px 16px 0}
.cat-tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{flex-shrink:0;padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;font-size:12px;color:var(--muted);cursor:pointer;transition:all .2s}
.cat-tab.active{background:var(--bg3);color:var(--text);border-color:var(--accent2)}

.products-section{padding:16px}
.products-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.product-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .2s}
.product-card:active{transform:scale(0.97)}
.product-card:hover{border-color:var(--accent)}
.product-img{width:100%;aspect-ratio:1;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:48px;position:relative}
.product-badge{position:absolute;top:8px;left:8px;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px}
.product-badge.new{background:var(--green)}
.product-badge.hot{background:var(--red)}
.product-info{padding:10px}
.product-brand{font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.product-name{font-size:13px;font-weight:600;margin-bottom:6px;line-height:1.3}
.product-bottom{display:flex;align-items:center;justify-content:space-between}
.product-price{font-size:14px;font-weight:700;color:var(--accent)}
.add-btn{width:28px;height:28px;border-radius:8px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:#000;font-weight:700;transition:transform .1s}
.add-btn:active{transform:scale(0.9)}

.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:flex-end}
.overlay.show{display:flex}
.cart-modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:80vh;overflow-y:auto;padding:20px}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:16px}
.cart-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.cart-item-icon{width:48px;height:48px;background:var(--bg3);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.cart-item-info{flex:1}
.cart-item-name{font-size:13px;font-weight:600}
.cart-item-brand{font-size:11px;color:var(--muted)}
.cart-item-price{font-size:14px;font-weight:700;color:var(--accent);margin-top:2px}
.qty-ctrl{display:flex;align-items:center;gap:8px}
.qty-btn{width:26px;height:26px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-num{font-size:13px;font-weight:600;min-width:16px;text-align:center}
.cart-total{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-top:1px solid var(--border);margin-top:8px}
.total-label{font-size:14px;color:var(--muted)}
.total-price{font-size:22px;font-weight:700;color:var(--accent)}
.order-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:14px;font-size:16px;font-weight:700;color:#000;cursor:pointer;margin-top:4px;font-family:inherit;transition:opacity .15s}
.order-btn:active{opacity:0.85}
.cart-empty{text-align:center;padding:32px;color:var(--muted)}

.detail-modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:85vh;overflow-y:auto;padding:20px}
.detail-img{width:100%;aspect-ratio:16/10;background:var(--bg3);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:80px;margin-bottom:16px}
.detail-brand{font-size:12px;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px}
.detail-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin:4px 0 8px}
.detail-desc{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:16px}
.detail-specs{background:var(--bg3);border-radius:12px;padding:14px;margin-bottom:16px}
.spec-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.spec-row:last-child{border:none}
.spec-key{color:var(--muted)}
.spec-val{font-weight:600}
.detail-bottom{display:flex;align-items:center;justify-content:space-between;gap:12px}
.detail-price{font-size:26px;font-weight:700;color:var(--accent)}
.detail-add{flex:1;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;font-size:15px;font-weight:700;color:#000;cursor:pointer;font-family:inherit}

.success-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;display:none;white-space:nowrap}
.success-toast.show{display:block;animation:fadeInOut 2s forwards}
@keyframes fadeInOut{0%{opacity:0;transform:translate(-50%,10px)}15%{opacity:1;transform:translate(-50%,0)}85%{opacity:1}100%{opacity:0}}

.order-success{text-align:center;padding:32px 20px}
.order-success .icon{font-size:64px;margin-bottom:16px}
.order-success h2{font-family:'Syne',sans-serif;font-size:24px;margin-bottom:8px}
.order-success p{color:var(--muted);font-size:14px;margin-bottom:24px}
.close-btn{padding:12px 32px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">⚡ EV PARTS</div>
    <button class="cart-btn" onclick="openCart()">
      🛒 Savat
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
  <div class="search-box">
    <span>🔍</span>
    <input type="text" placeholder="Zapchast qidiring..." id="searchInput" oninput="filterProducts()"/>
  </div>
</div>

<div class="brand-section">
  <div class="section-label">Mashina markasi</div>
  <div class="brand-tabs" id="brandTabs"></div>
</div>

<div class="cat-section">
  <div class="cat-tabs" id="catTabs"></div>
</div>

<div class="products-section">
  <div class="products-grid" id="productsGrid"></div>
</div>

<div class="overlay" id="cartOverlay" onclick="closeCartOutside(event)">
  <div class="cart-modal">
    <div class="modal-handle"></div>
    <div class="modal-title">🛒 Savatcha</div>
    <div id="cartItems"></div>
    <div id="cartTotalSection"></div>
  </div>
</div>

<div class="overlay" id="detailOverlay" onclick="closeDetailOutside(event)">
  <div class="detail-modal" id="detailModal"></div>
</div>

<div class="success-toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}

const brands=[
  {id:'all',name:'Barchasi',icon:'⚡'},

  {id:'byd',name:'BYD',icon:'🔵'},
  {id:'nio',name:'NIO',icon:'⚪'},
  {id:'xpeng',name:'XPENG',icon:'🟢'},
  {id:'hyundai',name:'Hyundai EV',icon:'🔷'},
  {id:'kia',name:'Kia EV',icon:'🟡'},
  {id:'voyah',name:'Voyah',icon:'🟠'},
];

const products=[
  {id:1,brand:'tesla',name:'Model 3 Batareya moduli',cat:'Batareya',price:2850000,icon:'🔋',badge:'hot',desc:'Tesla Model 3 uchun original LFP batareya moduli. 75 kWh quvvat, 3 yil kafolat.',specs:{Quvvat:'75 kWh',Kafolat:'3 yil',Ogirlik:'480 kg',Moslik:'Model 3 2018+'}},
  {id:2,brand:'tesla',name:'Supercharger adapter',cat:'Zaryad',price:450000,icon:'🔌',badge:'new',desc:'CCS2 dan Tesla Supercharger ga adapter. Tez zaryad qollab-quvvatlaydi.',specs:{Tok:'250A',Quvvat:'150 kW',Uzunlik:'30 cm',Kafolat:'1 yil'}},
  {id:3,brand:'tesla',name:'Model Y old suspenziya',cat:'Suspension',price:980000,icon:'🔧',badge:'',desc:'Model Y uchun original old suspenziya toplami. Ornatish oson.',specs:{Moslik:'Model Y 2020+',Material:'Alyuminiy',Kafolat:'2 yil',OEM:'6006127-00-C'}},
  {id:4,brand:'tesla',name:'Autopilot kamera toplami',cat:'Tashqi',price:1200000,icon:'📷',badge:'',desc:'Tesla Autopilot uchun 8 ta kamera toplami.',specs:{Soni:'8 dona',Kafolat:'2 yil',Moslik:'Model 3/Y',Sifat:'OEM'}},
  {id:5,brand:'byd',name:'BYD Atto 3 Blade Battery',cat:'Batareya',price:3200000,icon:'⚡',badge:'hot',desc:'BYD Atto 3 uchun Blade Battery texnologiyasi. Xavfsiz va uzoq umrli.',specs:{Quvvat:'60 kWh',Texnologiya:'Blade LFP',Kafolat:'5 yil',Umr:'500,000 km'}},
  {id:6,brand:'byd',name:'BYD 11kW AC charger',cat:'Zaryad',price:750000,icon:'🔌',badge:'new',desc:'BYD uchun 11 kW AC uy zaryad stantsiyasi. WiFi boshqaruv.',specs:{Quvvat:'11 kW',Tok:'3 fazali',IP:'IP65',Kafolat:'3 yil'}},
  {id:7,brand:'byd',name:'BYD Han eshik qoli',cat:'Tashqi',price:180000,icon:'🚪',badge:'',desc:'BYD Han uchun original elektr eshik qoli.',specs:{Moslik:'BYD Han 2021+',Rangi:'Chrome',Material:'ABS+Metall',Kafolat:'1 yil'}},
  {id:8,brand:'nio',name:'NIO 100kWh batareya',cat:'Batareya',price:4500000,icon:'🔋',badge:'',desc:'NIO swap tizimi uchun 100 kWh batareya.',specs:{Quvvat:'100 kWh',Texnologiya:'NMC',Kafolat:'10 yil',Almashtirish:'5 daqiqa'}},
  {id:9,brand:'nio',name:'NIO ES6 front motor',cat:'Motor',price:5800000,icon:'⚙️',badge:'hot',desc:'NIO ES6 uchun front induction motor. 180 kW quvvat.',specs:{Quvvat:'180 kW',Moment:'350 Nm',Kafolat:'3 yil',Moslik:'ES6 2019+'}},
  {id:10,brand:'xpeng',name:'XPENG G9 LiDAR modul',cat:'Tashqi',price:2100000,icon:'📡',badge:'new',desc:'XPENG G9 uchun original LiDAR sensori.',specs:{Model:'Livox HAP',Diapason:'200m',Kafolat:'2 yil',Moslik:'G9 2022+'}},
  {id:11,brand:'hyundai',name:'IONIQ 5 frunk organayzer',cat:'Aksessuarlar',price:320000,icon:'🧳',badge:'',desc:'IONIQ 5 old yukxona organayzer toplami.',specs:{Hajm:'24 L',Material:'EVA',Moslik:'IONIQ 5',Rang:'Qora'}},
  {id:12,brand:'hyundai',name:'IONIQ 6 salon gilami',cat:'Salon',price:280000,icon:'🎨',badge:'',desc:'IONIQ 6 uchun 3D TPE salon gilami toplami.',specs:{Toplam:'5 dona',Material:'TPE 3D',Moslik:'IONIQ 6',Rang:'Qora'}},
  {id:13,brand:'kia',name:'EV6 kabel organayzer',cat:'Aksessuarlar',price:150000,icon:'🛞',badge:'',desc:'Kia EV6 uchun zaryad kabeli organayzer.',specs:{Diametr:'60 cm',Material:'Kauchuk',Moslik:'EV6',Rang:'Qora'}},
  {id:14,brand:'kia',name:'EV6 GT-Line spoiler',cat:'Tashqi',price:890000,icon:'🏎️',badge:'new',desc:'EV6 GT-Line uchun original orqa spoiler.',specs:{Material:'ABS',Kafolat:'1 yil',Moslik:'EV6 2021+',Boyash:'Kerak'}},
  {id:15,brand:'tesla',name:'Model S Plaid rul',cat:'Salon',price:1650000,icon:'🎮',badge:'',desc:'Tesla Model S Plaid rul gildiragi. Yoke dizayn.',specs:{Material:'Alcantara+Karbon',Isitish:'Bor',Moslik:'Model S 2021+',Kafolat:'2 yil'}},
  {id:16,brand:'byd',name:'BYD Seal tormoz disklar',cat:'Suspension',price:420000,icon:'🔩',badge:'',desc:'BYD Seal uchun ventillatsiyali tormoz disklar (4 ta).',specs:{Diametr:'330mm',Material:'Qoyma temir',Toplam:'4 dona',Moslik:'BYD Seal 2022+'}},
  {id:17,brand:'voyah',name:'Voyah Free batareya moduli',cat:'Batareya',price:3800000,icon:'🔋',badge:'hot',desc:'Voyah Free uchun original NMC batareya moduli. 88 kWh quvvat.',specs:{Quvvat:'88 kWh',Texnologiya:'NMC 811',Kafolat:'8 yil',Moslik:'Voyah Free 2021+'}},
  {id:18,brand:'voyah',name:'Voyah Dreamer eshik motori',cat:'Motor',price:1250000,icon:'⚙️',badge:'new',desc:'Voyah Dreamer MPV uchun elektr siljuvchi eshik motori. Silliq va jim ishlaydi.',specs:{Quvvat:'150W',Tezlik:'0.3 m/s',Kafolat:'2 yil',Moslik:'Voyah Dreamer 2022+'}},
  {id:19,brand:'voyah',name:'Voyah Free 22kW charger',cat:'Zaryad',price:980000,icon:'🔌',badge:'',desc:'Voyah Free uchun 22 kW AC bortli charger moduli.',specs:{Quvvat:'22 kW',Tok:'3 fazali 32A',Kafolat:'3 yil',Moslik:'Voyah Free/Courage'}},
  {id:20,brand:'voyah',name:'Voyah Free old bufer',cat:'Tashqi',price:650000,icon:'🚗',badge:'',desc:'Voyah Free uchun original old bufer toplami. Park sensorlari bilan.',specs:{Material:'PP plastik',Sensorlar:'4 dona PDC',Boyash:'Kerak',Moslik:'Voyah Free 2021+'}},
  {id:21,brand:'voyah',name:'Voyah Dreamer Nappa o\'rindiq',cat:'Salon',price:1800000,icon:'💺',badge:'new',desc:'Voyah Dreamer uchun original Nappa charm old o\'rindiq. Isitish va ventilyatsiya.',specs:{Material:'Nappa charm',Isitish:'3 daraja',Ventilyatsiya:'2 daraja',Kafolat:'2 yil'}},
  {id:22,brand:'voyah',name:'Voyah Free havo amortizator',cat:'Suspension',price:780000,icon:'🔧',badge:'',desc:'Voyah Free uchun elektron boshqaruvli havo amortizatori.',specs:{Turi:'Havo suspenziya',Boshqaruv:'Elektron',Kafolat:'2 yil',Moslik:'Voyah Free 2021+'}},
];

let cart=[];
let activeBrand='all';
let activeCat='Barchasi';
let searchQ='';

function init(){
  const bt=document.getElementById('brandTabs');
  brands.forEach(b=>{
    const el=document.createElement('button');
    el.className='brand-tab'+(b.id==='all'?' active':'');
    el.textContent=b.icon+' '+b.name;
    el.onclick=()=>{
      activeBrand=b.id;activeCat='Barchasi';searchQ='';
      document.getElementById('searchInput').value='';
      document.querySelectorAll('.brand-tab').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');
      renderCats();renderProducts();
    };
    bt.appendChild(el);
  });
  renderCats();renderProducts();
}

function renderCats(){
  const ct=document.getElementById('catTabs');
  ct.innerHTML='';
  const filtered=products.filter(p=>activeBrand==='all'||p.brand===activeBrand);
  const cats=['Barchasi',...new Set(filtered.map(p=>p.cat))];
  cats.forEach(c=>{
    const el=document.createElement('button');
    el.className='cat-tab'+(c===activeCat?' active':'');
    el.textContent=c;
    el.onclick=()=>{
      activeCat=c;
      document.querySelectorAll('.cat-tab').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');renderProducts();
    };
    ct.appendChild(el);
  });
}

function filterProducts(){searchQ=document.getElementById('searchInput').value.toLowerCase();renderProducts();}

function renderProducts(){
  const grid=document.getElementById('productsGrid');
  const list=products.filter(p=>{
    const brandOk=activeBrand==='all'||p.brand===activeBrand;
    const catOk=activeCat==='Barchasi'||p.cat===activeCat;
    const searchOk=!searchQ||p.name.toLowerCase().includes(searchQ)||p.brand.toLowerCase().includes(searchQ);
    return brandOk&&catOk&&searchOk;
  });
  if(!list.length){
    grid.innerHTML='<div class="empty" style="grid-column:span 2"><div class="empty-icon">🔍</div><p>Mahsulot topilmadi</p></div>';
    return;
  }
  grid.innerHTML=list.map(p=>`
    <div class="product-card" onclick="openDetail(${p.id})">
      <div class="product-img">
        ${p.icon}
        ${p.badge?`<div class="product-badge ${p.badge}">${p.badge==='new'?'YANGI':'🔥 HOT'}</div>`:''}
      </div>
      <div class="product-info">
        <div class="product-brand">${brands.find(b=>b.id===p.brand)?.name||p.brand}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-bottom">
          <div class="product-price">${p.price.toLocaleString()}</div>
          <button class="add-btn" onclick="addToCart(event,${p.id})">+</button>
        </div>
      </div>
    </div>
  `).join('');
}

function addToCart(e,id){
  if(e)e.stopPropagation();
  const p=products.find(x=>x.id===id);
  const ex=cart.find(x=>x.id===id);
  if(ex)ex.qty++;
  else cart.push({...p,qty:1});
  updateCartCount();
  showToast('Savatga qoshildi!');
}

function updateCartCount(){
  const total=cart.reduce((s,x)=>s+x.qty,0);
  const el=document.getElementById('cartCount');
  el.textContent=total;
  total>0?el.classList.add('show'):el.classList.remove('show');
}

function openCart(){renderCart();document.getElementById('cartOverlay').classList.add('show');}
function closeCartOutside(e){if(e.target===document.getElementById('cartOverlay'))document.getElementById('cartOverlay').classList.remove('show');}
function closeDetailOutside(e){if(e.target===document.getElementById('detailOverlay'))document.getElementById('detailOverlay').classList.remove('show');}

function renderCart(){
  const items=document.getElementById('cartItems');
  const totalSec=document.getElementById('cartTotalSection');
  if(!cart.length){
    items.innerHTML='<div class="cart-empty"><div style="font-size:48px">🛒</div><p>Savat bosh</p></div>';
    totalSec.innerHTML='';return;
  }
  items.innerHTML=cart.map(p=>`
    <div class="cart-item">
      <div class="cart-item-icon">${p.icon}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${p.name}</div>
        <div class="cart-item-brand">${brands.find(b=>b.id===p.brand)?.name||p.brand}</div>
        <div class="cart-item-price">${(p.price*p.qty).toLocaleString()} som</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty(${p.id},-1)">-</button>
        <span class="qty-num">${p.qty}</span>
        <button class="qty-btn" onclick="changeQty(${p.id},1)">+</button>
      </div>
    </div>
  `).join('');
  const total=cart.reduce((s,x)=>s+x.price*x.qty,0);
  totalSec.innerHTML=`
    <div class="cart-total">
      <span class="total-label">Jami:</span>
      <span class="total-price">${total.toLocaleString()} som</span>
    </div>
    <button class="order-btn" onclick="placeOrder()">Buyurtma berish</button>
  `;
}

function changeQty(id,delta){
  const idx=cart.findIndex(x=>x.id===id);
  if(idx<0)return;
  cart[idx].qty+=delta;
  if(cart[idx].qty<=0)cart.splice(idx,1);
  updateCartCount();renderCart();
}

function placeOrder(){
  const total=cart.reduce((s,x)=>s+x.price*x.qty,0);
  if(tg)tg.sendData(JSON.stringify({items:cart.map(x=>({name:x.name,qty:x.qty,price:x.price})),total}));
  cart=[];updateCartCount();
  document.getElementById('cartItems').innerHTML='';
  document.getElementById('cartTotalSection').innerHTML=`
    <div class="order-success">
      <div class="icon">✅</div>
      <h2>Buyurtma qabul qilindi!</h2>
      <p>Tez orada siz bilan boglanamiz</p>
      <button class="close-btn" onclick="document.getElementById('cartOverlay').classList.remove('show')">Yopish</button>
    </div>
  `;
}

function openDetail(id){
  const p=products.find(x=>x.id===id);
  const modal=document.getElementById('detailModal');
  modal.innerHTML=`
    <div class="modal-handle"></div>
    <div class="detail-img">${p.icon}</div>
    <div class="detail-brand">${brands.find(b=>b.id===p.brand)?.name||p.brand} · ${p.cat}</div>
    <div class="detail-name">${p.name}</div>
    <div class="detail-desc">${p.desc}</div>
    <div class="detail-specs">
      ${Object.entries(p.specs).map(([k,v])=>`
        <div class="spec-row"><span class="spec-key">${k}</span><span class="spec-val">${v}</span></div>
      `).join('')}
    </div>
    <div class="detail-bottom">
      <div class="detail-price">${p.price.toLocaleString()} som</div>
      <button class="detail-add" onclick="addToCart(null,${p.id});document.getElementById('detailOverlay').classList.remove('show')">Savatga +</button>
    </div>
  `;
  document.getElementById('detailOverlay').classList.add('show');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

init();
</script>
</body>
</html>
